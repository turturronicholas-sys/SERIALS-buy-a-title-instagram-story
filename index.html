<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reveal The Photo – Buy A Tile!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Boogaloo&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0a00;
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; min-height: 100vh;
    font-family: 'Boogaloo', cursive;
    padding: 16px 0 32px; user-select: none;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 40px),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 60px);
    pointer-events: none; z-index: 0;
  }
  .app-wrapper {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    gap: 14px; width: min(567px, 98vw);
  }
  .upload-panel {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 2px dashed rgba(245,200,66,0.4);
    border-radius: 8px; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .upload-panel-title {
    color: #f5c842; font-family: 'Anton', sans-serif;
    font-size: clamp(13px,3vw,16px); letter-spacing: 1px; text-align: center;
  }
  .upload-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .upload-label-text { color: #aaa; font-size: clamp(11px,2.5vw,13px); white-space: nowrap; min-width: 100px; }
  .upload-btn {
    flex: 1; min-width: 120px; padding: 8px 12px;
    background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 5px; color: #fff; font-family: 'Boogaloo', cursive;
    font-size: clamp(12px,2.8vw,14px); cursor: pointer; text-align: center;
    transition: background 0.15s, border-color 0.15s;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .upload-btn:hover { background: rgba(255,255,255,0.15); border-color: #f5c842; }
  .upload-btn.loaded { border-color: #2aaa88; color: #2aaa88; }
  input[type=file] { display: none; }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-row label { color: #aaa; font-size: clamp(11px,2.5vw,13px); white-space: nowrap; min-width: 100px; }
  input[type=range] { flex: 1; accent-color: #1b9adf; cursor: pointer; height: 4px; }
  .slider-val { color: #fff; font-family: 'Anton', sans-serif; font-size: 13px; min-width: 38px; text-align: right; }
  .btn-row { display: flex; gap: 8px; }
  .apply-btn {
    flex: 1; padding: 10px; background: #9b35c8; color: #fff;
    font-family: 'Anton', sans-serif; font-size: clamp(13px,3vw,15px);
    letter-spacing: 1px; border: none; border-radius: 5px; cursor: pointer;
    box-shadow: 3px 3px 0 #4a1060;
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
    opacity: 0.4; pointer-events: none;
  }
  .apply-btn.ready { opacity: 1; pointer-events: all; }
  .apply-btn:hover  { transform: translateY(-2px); box-shadow: 3px 5px 0 #4a1060; }
  .apply-btn:active { transform: translateY(1px);  box-shadow: 1px 1px 0 #4a1060; }
  .drag-toggle {
    padding: 10px 14px; background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.25); border-radius: 5px; color: #ccc;
    font-family: 'Anton', sans-serif; font-size: clamp(12px,2.8vw,14px);
    letter-spacing: 1px; cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .drag-toggle.active { background: #1b9adf; border-color: #1b9adf; color: #fff; box-shadow: 3px 3px 0 #0a4a70; }
  .drag-hint { text-align: center; color: #1b9adf; font-size: clamp(11px,2.5vw,13px); display: none; }
  .drag-hint.visible { display: block; }
  .game-container {
    position: relative; width: 100%; aspect-ratio: 567/1007;
    border-radius: 6px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.9);
  }
  #mainCanvas { position: absolute; top:0; left:0; width:100%; height:100%; display:block; }
  #mainCanvas.drag-mode { cursor: grab; z-index: 2; }
  #mainCanvas.drag-mode:active { cursor: grabbing; }
  .tile-grid { position: absolute; inset: 0; z-index: 1; }
  .tile { cursor: pointer; position: absolute; }
  .tile:hover .hover-outline { opacity: 1; }
  .hover-outline {
    position: absolute; inset: 4px;
    border: 3px solid rgba(255,255,255,0.6); border-radius: 4px;
    opacity: 0; transition: opacity 0.15s; pointer-events: none;
  }
  .tile.removed { pointer-events: none; }
  .ripple {
    position: absolute; width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,0.7); transform: scale(0);
    animation: rippleAnim 0.5s linear; pointer-events: none; z-index: 9;
  }
  @keyframes rippleAnim { to { transform: scale(22); opacity: 0; } }
  .control-bar {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 0 4px; flex-wrap: wrap; gap: 8px;
  }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-label { color: #f5c842; font-size: clamp(11px,2.5vw,14px); letter-spacing: 1px; text-transform: uppercase; }
  .stat-value { font-family: 'Anton', sans-serif; color: #fff; font-size: clamp(18px,4vw,24px); text-shadow: 2px 2px 0 #e85d04; line-height: 1; }
  .download-btn {
    padding: 10px 20px; background: #e85d04; color: #fff;
    font-family: 'Anton', sans-serif; font-size: clamp(13px,3vw,16px);
    letter-spacing: 1.5px; border: none; border-radius: 5px; cursor: pointer;
    box-shadow: 3px 3px 0 #7b2d00; transition: transform 0.1s, box-shadow 0.1s; white-space: nowrap;
  }
  .download-btn:hover  { transform: translateY(-2px); box-shadow: 3px 5px 0 #7b2d00; }
  .download-btn:active { transform: translateY(1px);  box-shadow: 1px 1px 0 #7b2d00; }
</style>
</head>
<body>
<div class="app-wrapper">
  <div class="upload-panel">
    <div class="upload-panel-title">🖼 SWAP HIDDEN PHOTO</div>
    <div class="upload-row">
      <span class="upload-label-text">Hidden photo:</span>
      <label class="upload-btn" id="photoLabel" for="photoInput">Choose file…</label>
      <input type="file" id="photoInput" accept="image/*">
    </div>
    <div class="slider-row">
      <label for="scaleSlider">Size:</label>
      <input type="range" id="scaleSlider" min="10" max="300" value="100" step="1">
      <span class="slider-val" id="scaleVal">100%</span>
    </div>
    <div class="btn-row">
      <button class="apply-btn" id="applyBtn" onclick="applyUploads()">▶ APPLY IMAGE</button>
      <button class="drag-toggle" id="dragToggle" onclick="toggleDragMode()">✥ REPOSITION</button>
    </div>
    <div class="drag-hint" id="dragHint">Drag to reposition • adjust size with slider • click DONE when finished</div>
  </div>

  <div class="game-container">
    <canvas id="mainCanvas"></canvas>
    <div class="tile-grid" id="tileGrid"></div>
  </div>

  <div class="control-bar">
    <div class="stat"><span class="stat-label">Donated</span><span class="stat-value" id="donatedDisplay">$0</span></div>
    <div class="stat"><span class="stat-label">Tiles Left</span><span class="stat-value" id="tilesLeftDisplay">16</span></div>
    <div class="stat"><span class="stat-label">Revealed</span><span class="stat-value" id="revealedDisplay">0%</span></div>
    <button class="download-btn" onclick="downloadSnapshot()">⬇ SAVE JPG</button>
  </div>
</div>

function buildFrameCanvas() {
  fctx.clearRect(0, 0, NW, NH);
  fctx.drawImage(imgFrame, 0, 0, NW, NH);
  const id = fctx.getImageData(0, 0, NW, NH), d = id.data;
  for (let i = 0; i < d.length; i += 4)
    if (d[i] < 20 && d[i+1] < 20 && d[i+2] < 20) d[i+3] = 0;
  fctx.putImageData(id, 0, 0);
}

function renderTiles() {
  octx.clearRect(0, 0, NW, NH);
  octx.save();
  // Hard clip: only draw tile overlay pixels within the safe rect (no yellow bleed)
  octx.beginPath();
  octx.rect(CLIP_X, CLIP_Y, CLIP_W, CLIP_H);
  octx.clip();
  octx.globalCompositeOperation = 'source-over';
  octx.drawImage(imgTiles, 0, 0, NW, NH);
  octx.globalCompositeOperation = 'destination-out';
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (removed[r][c]) {
        const {x,y,w,h} = tileRect(r,c);
        octx.fillStyle = 'rgba(0,0,0,1)'; octx.fillRect(x,y,w,h);
      }
  octx.restore();
  octx.globalCompositeOperation = 'source-over';
}

function compositeToMain(hideTiles) {
  ctx.clearRect(0, 0, NW, NH);
  if (imgPhoto) {
    const dw = imgPhoto.naturalWidth * photoScale;
    const dh = imgPhoto.naturalHeight * photoScale;
    ctx.drawImage(imgPhoto, photoOffsetX, photoOffsetY, dw, dh);
  }
  if (!hideTiles) ctx.drawImage(offTiles, 0, 0, NW, NH);
  ctx.drawImage(offFrame, 0, 0, NW, NH);
}

function renderCanvas(hideTiles) { renderTiles(); compositeToMain(hideTiles); }

function tileRect(row, col) {
  const [x0f,x1f] = COL_BOUNDS[col], [y0f,y1f] = ROW_BOUNDS[row];
  return { x:x0f*NW, y:y0f*NH, w:(x1f-x0f)*NW, h:(y1f-y0f)*NH };
}

function buildGrid() {
  const tg = document.getElementById('tileGrid');
  tg.innerHTML = '';
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const [x0f,x1f] = COL_BOUNDS[c], [y0f,y1f] = ROW_BOUNDS[r];
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.style.left   = (x0f*100)+'%'; tile.style.top    = (y0f*100)+'%';
    tile.style.width  = ((x1f-x0f)*100)+'%'; tile.style.height = ((y1f-y0f)*100)+'%';
    tile.dataset.row = r; tile.dataset.col = c;
    if (removed[r][c]) tile.classList.add('removed');
    const outline = document.createElement('div');
    outline.className = 'hover-outline'; tile.appendChild(outline);
    tile.addEventListener('click', function(e) {
      if (animating || dragMode) return;
      const row=+this.dataset.row, col=+this.dataset.col;
      if (removed[row][col]) return;
      handleClick(this, e, row, col);
    });
    tg.appendChild(tile);
  }
}

function resetGame() {
  removed = Array.from({length:ROWS}, () => Array(COLS).fill(false));
  donated = 0; removedCount = 0; animating = false;
  updateDisplay(); renderCanvas(false); buildGrid();
}

document.getElementById('scaleSlider').addEventListener('input', function() {
  photoScale = this.value / 100;
  document.getElementById('scaleVal').textContent = this.value + '%';
  compositeToMain(dragMode);
});

function toggleDragMode() {
  dragMode = !dragMode;
  const btn=document.getElementById('dragToggle'), hint=document.getElementById('dragHint');
  const tg=document.getElementById('tileGrid');
  if (dragMode) {
    btn.classList.add('active'); btn.textContent = '✓ DONE';
    hint.classList.add('visible'); canvas.classList.add('drag-mode');
    tg.style.pointerEvents = 'none';
    compositeToMain(true);
  } else {
    btn.classList.remove('active'); btn.textContent = '✥ REPOSITION';
    hint.classList.remove('visible'); canvas.classList.remove('drag-mode');
    tg.style.pointerEvents = '';
    compositeToMain(false);
  }
}

function getCanvasScale() { return NW / canvas.getBoundingClientRect().width; }

canvas.addEventListener('mousedown', function(e) {
  if (!dragMode) return;
  isDragging=true; dragStartScreenX=e.clientX; dragStartScreenY=e.clientY;
  dragStartOX=photoOffsetX; dragStartOY=photoOffsetY;
  e.preventDefault(); e.stopPropagation();
});
window.addEventListener('mousemove', function(e) {
  if (!isDragging||!dragMode) return;
  const s=getCanvasScale();
  photoOffsetX=dragStartOX+(e.clientX-dragStartScreenX)*s;
  photoOffsetY=dragStartOY+(e.clientY-dragStartScreenY)*s;
  compositeToMain(true);
});
window.addEventListener('mouseup', ()=>{ isDragging=false; });

canvas.addEventListener('touchstart', function(e) {
  if (!dragMode) return;
  const t=e.touches[0]; isDragging=true;
  dragStartScreenX=t.clientX; dragStartScreenY=t.clientY;
  dragStartOX=photoOffsetX; dragStartOY=photoOffsetY;
  e.preventDefault();
},{passive:false});
window.addEventListener('touchmove', function(e) {
  if (!isDragging||!dragMode) return;
  const t=e.touches[0], s=getCanvasScale();
  photoOffsetX=dragStartOX+(t.clientX-dragStartScreenX)*s;
  photoOffsetY=dragStartOY+(t.clientY-dragStartScreenY)*s;
  compositeToMain(true); e.preventDefault();
},{passive:false});
window.addEventListener('touchend', ()=>{ isDragging=false; });

function handleClick(tile, event, row, col) {
  const ripple=document.createElement('div'); ripple.className='ripple';
  const rect=tile.getBoundingClientRect();
  ripple.style.left=(event.clientX-rect.left-5)+'px';
  ripple.style.top=(event.clientY-rect.top-5)+'px';
  tile.appendChild(ripple); setTimeout(()=>ripple.remove(),600);
  removed[row][col]=true; tile.classList.add('removed'); animating=true;
  animateErase(row,col,()=>{ animating=false; donated+=PRICES[row]; removedCount++; updateDisplay(); });
}

function animateErase(row, col, onDone) {
  const {x,y,w,h}=tileRect(row,col);
  const START=performance.now(), DUR=380;
  function step(now) {
    const t=Math.min((now-START)/DUR,1), alpha=t*t*(3-2*t);
    octx.clearRect(0,0,NW,NH);
    octx.save();
    octx.beginPath(); octx.rect(CLIP_X,CLIP_Y,CLIP_W,CLIP_H); octx.clip();
    octx.globalCompositeOperation='source-over';
    octx.drawImage(imgTiles,0,0,NW,NH);
    octx.globalCompositeOperation='destination-out';
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++)
      if (removed[r][c]&&!(r===row&&c===col)) {
        const rr=tileRect(r,c); octx.fillStyle='rgba(0,0,0,1)'; octx.fillRect(rr.x,rr.y,rr.w,rr.h);
      }
    octx.fillStyle=`rgba(0,0,0,${alpha})`; octx.fillRect(x,y,w,h);
    octx.restore(); octx.globalCompositeOperation='source-over';
    compositeToMain(false);
    if (t<1) requestAnimationFrame(step); else onDone();
  }
  requestAnimationFrame(step);
}

let pendingPhoto=null;
document.getElementById('photoInput').addEventListener('change',function(){
  if (!this.files[0]) return;
  document.getElementById('photoLabel').textContent=this.files[0].name;
  document.getElementById('photoLabel').classList.add('loaded');
  const reader=new FileReader();
  reader.onload=e=>{ pendingPhoto=e.target.result; document.getElementById('applyBtn').classList.add('ready'); };
  reader.readAsDataURL(this.files[0]);
});

function applyUploads() {
  if (!pendingPhoto) return;
  const img=new Image();
  img.onload=()=>{
    imgPhoto=img;
    const scaleToFit=CLIP_H/img.naturalHeight;
    photoScale=scaleToFit;
    photoOffsetX=CLIP_X+(CLIP_W-img.naturalWidth*scaleToFit)/2;
    photoOffsetY=CLIP_Y;
    const sv=Math.round(scaleToFit*100);
    const sl=document.getElementById('scaleSlider');
    sl.value=Math.min(Math.max(sv,+sl.min),+sl.max);
    document.getElementById('scaleVal').textContent=sl.value+'%';
    resetGame();
  };
  img.src=pendingPhoto;
}

function downloadSnapshot() {
  try {
    const link=document.createElement('a'); link.download='serials-reveal.jpg';
    link.href=canvas.toDataURL('image/jpeg',0.92);
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
  } catch(err) { alert('Download failed: '+err.message); }
}

function updateDisplay() {
  document.getElementById('donatedDisplay').textContent='$'+donated;
  document.getElementById('tilesLeftDisplay').textContent=TOTAL-removedCount;
  document.getElementById('revealedDisplay').textContent=Math.round(removedCount/TOTAL*100)+'%';
}

updateDisplay();
</script>
